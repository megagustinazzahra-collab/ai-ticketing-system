version: '3.8'

services:
  app:
    build: .
    container_name: wms_app
    ports:
      - "8020:3000"
    depends_on:
      - postgres
      - redis
      - minio
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
    volumes:
      - ./logs:/app/logs
    networks:
      - ticketing_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: wms_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ticketing_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wms_redis
    command: >
      sh -c '[ -n "$REDIS_PASSWORD" ] && redis-server --requirepass "$REDIS_PASSWORD" || redis-server'
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ticketing_network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: wms_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ticketing_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: wms_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - ticketing_network
    restart: unless-stopped

networks:
  ticketing_network:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
